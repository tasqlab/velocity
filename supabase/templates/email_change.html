<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Email Change - Velocity</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: 
        radial-gradient(ellipse 65% 55% at 10% 15%, rgba(37,99,235,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 85%, rgba(6,182,212,0.09) 0%, transparent 55%),
        #04080f;
      margin: 0;
      padding: 0;
      color: #e8f0fe;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
    }
    .card {
      background: rgba(12, 22, 48, 0.6);
      border: 1px solid rgba(59, 130, 246, 0.1);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(24px);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px 0;
      text-align: center;
      color: #e8f0fe;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: rgba(200, 220, 255, 0.6);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 32px 0;
      text-align: center;
    }
    .email-change {
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 16px;
      padding: 24px;
      margin: 32px 0;
    }
    .email-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .email-box {
      background: rgba(37, 99, 235, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #60a5fa;
    }
    .arrow {
      color: rgba(160, 190, 240, 0.35);
      font-size: 20px;
    }
    .button {
      display: block;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      text-align: center;
      margin: 32px 0;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
      border: none;
    }
    .warning {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: rgba(251, 191, 36, 0.9);
      margin-top: 24px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .warning::before {
      content: "⚠️";
      font-size: 14px;
    }
    .footer {
      text-align: center;
      font-size: 13px;
      color: rgba(160, 190, 240, 0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M13 3L4 14h8l-1 7 9-11h-8l1-10z" fill="white"/>
        </svg>
      </div>
    </div>
    
    <div class="card">
      <h1>Confirm email change</h1>
      <p class="subtitle">You requested to change the email address for your Velocity account.</p>
      
      <div class="email-change">
        <div class="email-row">
          <div class="email-box">{{ .Email }}</div>
          <div class="arrow">→</div>
          <div class="email-box">{{ .NewEmail }}</div>
        </div>
      </div>
      
      <a href="{{ .ConfirmationURL }}" class="button">Confirm Change</a>
      
      <div class="warning">
        <span>If you didn't request this, secure your account immediately by changing your password.</span>
      </div>
    </div>
    
    <div class="footer" style="margin-top: 40px;">
      <p>Velocity Chat &copy; 2026</p>
    </div>
  </div>
</body>
</html>
