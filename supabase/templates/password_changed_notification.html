<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Changed - Velocity</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: 
        radial-gradient(ellipse 65% 55% at 10% 15%, rgba(37,99,235,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 85%, rgba(6,182,212,0.09) 0%, transparent 55%),
        #04080f;
      margin: 0;
      padding: 0;
      color: #e8f0fe;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
    }
    .card {
      background: rgba(12, 22, 48, 0.6);
      border: 1px solid rgba(59, 130, 246, 0.1);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(24px);
    }
    .success-banner {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 32px;
    }
    .success-icon {
      width: 56px;
      height: 56px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      text-align: center;
      color: #86efac;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: rgba(200, 220, 255, 0.6);
      font-size: 14px;
      line-height: 1.6;
      margin: 16px 0 0;
      text-align: center;
    }
    .details {
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin: 32px 0;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(59, 130, 246, 0.1);
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      color: rgba(160, 190, 240, 0.5);
      font-size: 13px;
    }
    .detail-value {
      color: #e8f0fe;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }
    .warning {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: rgba(252, 165, 165, 0.9);
      margin-top: 32px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .warning::before {
      content: "🛡️";
      font-size: 14px;
    }
    .footer {
      text-align: center;
      font-size: 13px;
      color: rgba(160, 190, 240, 0.35);
    }
    .footer a {
      color: #60a5fa;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M13 3L4 14h8l-1 7 9-11h-8l1-10z" fill="white"/>
        </svg>
      </div>
    </div>
    
    <div class="card">
      <div class="success-banner">
        <div class="success-icon">✓</div>
        <h1>Password changed</h1>
        <p class="subtitle">Your Velocity account password has been successfully updated.</p>
      </div>
      
      <div class="details">
        <div class="detail-row">
          <span class="detail-label">Account</span>
          <span class="detail-value">{{ .Email }}</span>
        </div>
      </div>
      
      <div class="warning">
        <span>If you didn't make this change, please reset your password immediately and contact <a href="mailto:support@velocity.chat">support</a>.</span>
      </div>
    </div>
    
    <div class="footer" style="margin-top: 40px;">
      <p>Velocity Chat &copy; 2026</p>
    </div>
  </div>
</body>
</html>
