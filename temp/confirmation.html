<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Velocity</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a; font-family: 'Segoe UI', system-ui, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #0a0a0a; padding: 40px 20px;">
      <tr>
        <td align="center">
          <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 500px; background-color: #1a1a1a; border-radius: 16px; border: 1px solid #2a2a2a;">
            <!-- Logo Section -->
            <tr>
              <td style="padding: 40px 40px 20px; text-align: center;">
                <div style="display: inline-block; width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, #00D1FF 0%, #0099CC 100%); box-shadow: 0 8px 30px rgba(0,209,255,0.3);">
                  <svg width="36" height="36" viewBox="0 0 24 24" fill="white" style="display: block; margin: 14px auto;" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                  </svg>
                </div>
              </td>
            </tr>
            
            <!-- Title -->
            <tr>
              <td style="padding: 0 40px; text-align: center;">
                <h1 style="margin: 0; color: #ffffff; font-size: 28px; font-weight: 700;">Welcome to Velocity</h1>
              </td>
            </tr>
            
            <!-- Subtitle -->
            <tr>
              <td style="padding: 16px 40px; text-align: center;">
                <p style="margin: 0; color: #888888; font-size: 16px; line-height: 1.5;">
                  Hi {{username}},<br>
                  Chat. Status. Calls. All in one place.
                </p>
              </td>
            </tr>
            
            <!-- Button -->
            <tr>
              <td style="padding: 24px 40px; text-align: center;">
                <a href="{{confirmationUrl}}" style="display: inline-block; padding: 16px 32px; background: linear-gradient(135deg, #00D1FF 0%, #0099CC 100%); color: #ffffff; text-decoration: none; font-weight: 600; font-size: 16px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,209,255,0.3);">
                  Confirm Email
                </a>
              </td>
            </tr>
            
            <!-- Fallback Link -->
            <tr>
              <td style="padding: 0 40px 32px; text-align: center;">
                <p style="margin: 0; color: #666666; font-size: 13px;">
                  Or copy this link:<br>
                  <span style="color: #00D1FF; word-break: break-all;">{{confirmationUrl}}</span>
                </p>
              </td>
            </tr>
            
            <!-- Footer -->
            <tr>
              <td style="padding: 24px 40px; border-top: 1px solid #2a2a2a; text-align: center;">
                <p style="margin: 0; color: #666666; font-size: 12px;">
                  © 2026 Velocity. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
</body>
</html>
